<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace - Secure Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-section { display: none; text-align: left; margin-top: 30px; }
        .login-box { max-width: 400px; margin: 40px auto; }
        .admin-btn { padding: 8px 16px; font-size: 0.9rem; border-radius: 15px; border: none; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .btn-delete { background-color: #e3a2a9; color: #5a252b; }
        .btn-delete:hover { background-color: #d18f96; }
        .btn-reset { background-color: #fceea7; color: #5c4b12; margin-right: 8px; }
        .btn-reset:hover { background-color: #ebda8d; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 15px 20px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03); }
        .admin-input { padding: 10px 14px; border-radius: 20px; border: 1px solid #dee5e1; outline: none; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 750px;">
        <h1>Moderator Dashboard</h1>
        <p class="subtitle">Secure administrative control room</p>

        <div id="loginView" class="login-box input-card">
            <h3 style="margin-bottom: 15px; font-weight: 400; color: #414d46;">Enter Password</h3>
            <input type="password" id="adminPassword" class="admin-input" style="width: 100%;" placeholder="••••••••">
            <button class="main-btn" onclick="attemptLogin()" style="width: 100%; margin-top: 10px;">Access Controls</button>
            <p id="loginError" style="color: #9c4449; font-size: 0.9rem; margin-top: 10px;" class="hidden"></p>
        </div>

        <div id="adminView" class="admin-section">
            
            <div class="input-card" style="margin-bottom: 30px;">
                <h3 style="font-weight: 400; color: #414d46; margin-bottom: 15px;">Create Schedule Session Slot</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="slotDate" class="admin-input" style="flex: 1; min-width: 150px;" placeholder="e.g., Today, Friday">
                    <input type="text" id="slotTime" class="admin-input" style="flex: 1; min-width: 150px;" placeholder="e.g., 5:00 PM, 11:30 AM">
                    <button class="main-btn" onclick="addNewSlot()" style="padding: 10px 24px;">Create Slot</button>
                </div>
            </div>

            <h2 style="margin-bottom: 15px; font-weight: 400;">Timing Slots Schedule</h2>
            <div id="adminSlotsList" style="margin-bottom: 40px;">
                <p class="loading-text">Fetching slots...</p>
            </div>

            <h2 style="margin-bottom: 15px; font-weight: 400;">Public Vents Feed</h2>
            <div id="adminVentsList">
                <p class="loading-text">Fetching vents...</p>
            </div>
            
            <button class="main-btn" onclick="logout()" style="background-color: #8fa195; margin-top: 30px; width: 100%;">Log Out Securely</button>
        </div>
    </div>

    <script>
        // Check if already authenticated on load
        async function checkSession() {
            try {
                const res = await fetch('http://127.0.0.1:5000/api/admin/check', { credentials: 'include' });
                if (res.ok) {
                    showAdminView();
                }
            } catch(e) {
                console.log("No active admin session.");
            }
        }

        async function attemptLogin() {
            const password = document.getElementById('adminPassword').value;
            const errorText = document.getElementById('loginError');
            errorText.textContent = '';

            try {
                const res = await fetch('http://127.0.0.1:5000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                    credentials: 'include' // Crucial: enables secure session cookie storage
                });

                if (res.ok) {
                    showAdminView();
                } else {
                    const data = await res.json();
                    errorText.textContent = data.error || "Login Failed.";
                }
            } catch (err) {
                errorText.textContent = "Could not reach server.";
            }
        }

        function showAdminView() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
            loadAdminSlots();
            loadAdminVents();
        }

        async function logout() {
            await fetch('http://127.0.0.1:5000/api/admin/logout', { method: 'POST', credentials: 'include' });
            window.location.reload();
        }

        // --- MANAGE SLOTS ---
        async function loadAdminSlots() {
            const container = document.getElementById('adminSlotsList');
            try {
                const res = await fetch('http://127.0.0.1:5000/api/slots');
                const slots = await res.json();
                container.innerHTML = '';

                if(slots.length === 0) {
                    container.innerHTML = '<p class="loading-text">No active slots scheduled.</p>';
                    return;
                }

                slots.forEach(slot => {
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    
                    let slotInfo = `<div><strong>${slot.date} - ${slot.time}</strong> <span style="font-size:0.85rem; padding: 2px 8px; border-radius:10px; margin-left: 8px; font-weight:bold; background: ${slot.status === 'booked' ? '#edf5f1; color:#2b543a' : '#fcf8e8; color:#a38515'}">${slot.status.toUpperCase()}</span>`;
                    
                    if(slot.room_link) {
                        slotInfo += `<br><a href="${slot.room_link}" target="_blank" style="font-size: 0.85rem; color:#4a544e;">Room Link: ${slot.room_link}</a>`;
                    }
                    slotInfo += `</div>`;

                    const controls = document.createElement('div');
                    
                    // If slot is booked, offer to reset it back to 'available'
                    if(slot.status === 'booked') {
                        const resetBtn = document.createElement('button');
                        resetBtn.className = 'admin-btn btn-reset';
                        resetBtn.textContent = 'Reset';
                        resetBtn.onclick = () => resetSlot(slot.id);
                        controls.appendChild(resetBtn);
                    }

                    // Delete button
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'admin-btn btn-delete';
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.onclick = () => deleteSlot(slot.id);
                    controls.appendChild(deleteBtn);

                    div.innerHTML = slotInfo;
                    div.appendChild(controls);
                    container.appendChild(div);
                });
            } catch(e) {
                container.innerHTML = '<p class="loading-text">Error loading schedules.</p>';
            }
        }

        async function addNewSlot() {
            const date = document.getElementById('slotDate').value.trim();
            const time = document.getElementById('slotTime').value.trim();
            if(!date || !time) return;

            await fetch('http://127.0.0.1:5000/api/admin/slots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, time }),
                credentials: 'include'
            });

            document.getElementById('slotDate').value = '';
            document.getElementById('slotTime').value = '';
            loadAdminSlots();
        }

        async function resetSlot(id) {
            if(confirm("Reset this session slot back to available?")) {
                await fetch(`http://127.0.0.1:5000/api/admin/slots/${id}/reset`, { method: 'POST', credentials: 'include' });
                loadAdminSlots();
            }
        }

        async function deleteSlot(id) {
            if(confirm("Remove this session slot completely from the calendar?")) {
                await fetch(`http://127.0.0.1:5000/api/admin/slots/${id}`, { method: 'DELETE', credentials: 'include' });
                loadAdminSlots();
            }
        }

        // --- MANAGE VENTS ---
        async function loadAdminVents() {
            const container = document.getElementById('adminVentsList');
            try {
                const res = await fetch('http://127.0.0.1:5000/api/vents');
                const vents = await res.json();
                container.innerHTML = '';

                if(vents.length === 0) {
                    container.innerHTML = '<p class="loading-text">No shared thoughts posted.</p>';
                    return;
                }

                vents.forEach(vent => {
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    div.innerHTML = `
                        <div style="flex:1; padding-right: 20px;">
                            <p style="color:#2c332f;">${vent.content}</p>
                            <span style="font-size:0.8rem; color:#8fa195;">ID: #${vent.id} | Replies: ${vent.replies.length}</span>
                        </div>
                    `;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'admin-btn btn-delete';
                    deleteBtn.textContent = 'Delete Post';
                    deleteBtn.onclick = () => deleteVent(vent.id);

                    div.appendChild(deleteBtn);
                    container.appendChild(div);
                });
            } catch(e) {
                container.innerHTML = '<p class="loading-text">Error loading feed stream.</p>';
            }
        }

        async function deleteVent(id) {
            if(confirm("Delete this thought and all associated replies?")) {
                await fetch(`http://127.0.0.1:5000/api/admin/vents/${id}`, { method: 'DELETE', credentials: 'include' });
                loadAdminVents();
            }
        }

        // Run check on boot
        checkSession();
    </script>
</body>
</html>
